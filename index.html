<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Letters I Never Sent</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= OPENING SCREEN ================= -->

<section id="opening" class="screen active">

<h1>letters i never sent</h1>

<p>
A place for every word<br>
you never had the courage to say.
</p>

<div id="startEnvelope" class="big-envelope">

<div class="flap"></div>

<div class="paper"></div>

</div>

<p class="tap">Tap the envelope</p>

</section>

<!-- ================= COLLECTION ================= -->

<section id="collection" class="screen">

<header>

<h2>Your Letters</h2>

<button id="newLetterBtn">+ New Letter</button>

</header>

<div id="letterGrid"></div>

</section>

<!-- ================= WRITER ================= -->

<section id="writer" class="screen">

<h2>Write a Letter</h2>

<input
id="title"
type="text"
placeholder="Letter title..."
>

<textarea
id="content"
placeholder="Write your heart out..."
></textarea>

<input
id="song"
type="text"
placeholder="Song recommendation"
>

<input
id="film"
type="text"
placeholder="Film recommendation"
>

<button id="saveBtn">
Seal Letter ✉️
</button>

<button class="backBtn">
Back
</button>

</section>

<!-- ================= READER ================= -->

<section id="reader" class="screen">

<div id="letterView"></div>

<button class="backBtn">
Back
</button>

</section>

<script src="script.js"></script>

</body>
</html>
