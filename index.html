<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letters I Never Sent</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<!-- ===============================
OPENING SCREEN
=============================== -->

<section id="opening" class="screen active">

<div class="stars"></div>

<div class="intro">

<h1>letters i never sent</h1>

<p>

Some words were never spoken.

Some feelings never reached the person

they were meant for.

Tonight,

they finally have a home.

</p>

<div id="introEnvelope" class="intro-envelope">

<div class="flap"></div>

<div class="paper"></div>

</div>

<p class="tap">

Tap the envelope

</p>

</div>

</section>

<!-- ===============================
COLLECTION
=============================== -->

<section id="collection" class="screen">

<header>

<h2>Your Letters</h2>

<button id="writeBtn">

+ Write Letter

</button>

</header>

<div id="letterCollection">

<!-- generated by JavaScript -->

</div>

</section>

<!-- ===============================
WRITER
=============================== -->

<section id="writer" class="screen">

<div class="paper-page">

<h2>

Write a Letter

</h2>

<input
id="title"
type="text"
placeholder="Letter title..."
>

<textarea
id="content"
placeholder="Write everything you never got to say..."
></textarea>

<input
id="song"
type="text"
placeholder="Song recommendation (optional)"
>

<input
id="film"
type="text"
placeholder="Film recommendation (optional)"
>

<div class="buttons">

<button id="saveLetter">

Seal Letter ✉️

</button>

<button class="back">

Cancel

</button>

</div>

</div>

</section>
<!-- ===============================
READER
=============================== -->

<section id="reader" class="screen">

<div class="paper-page">

<button id="backToCollection">

← Back

</button>

<div id="letterView">

<!-- Filled by JavaScript -->

</div>

</div>

</section>

<!-- ===============================
ANIMATION OVERLAY
=============================== -->

<div id="transition">

<div id="transitionEnvelope">

<div class="flap"></div>

<div class="paper"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
