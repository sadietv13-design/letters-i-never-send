<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>letters i never sent</title>

    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>letters i never sent</h1>
    <p>a place for things you never said out loud</p>
</header>

<div class="container">

    <section class="composer">
        <input id="title" type="text" placeholder="Title of this letter...">

        <textarea id="content" placeholder="Write your letter..."></textarea>

        <input id="song" type="text" placeholder="Song recommendation (optional)">

        <input id="film" type="text" placeholder="Film recommendation (optional)">

        <button onclick="saveLetter()">Save Letter</button>
    </section>

    <section id="entries"></section>

</div>

<script src="script.js"></script>

</body>
</html>
